name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Stats Card
        uses: lowlighter/metrics@latest
        with:
          filename: stats/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Fazman-s
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_twemoji: yes
          config_display: large
          config_padding: 0, 8 + 11%
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_repositories_limit: 4
          plugin_lines_history_limit: 1
          plugin_traffic: yes
          plugin_stargazers: yes
          plugin_stargazers_charts_type: classic
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit
          plugin_repositories: 100
          plugin_repositories_featured: Fazman-s/Fazman-s
          plugin_repositories_batch: 100

      - name: Generate Top Languages Card
        uses: lowlighter/metrics@latest
        with:
          filename: stats/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Fazman-s
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_recent_load: 400
          plugin_languages_recent_days: 14
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: programming

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./stats/
          git commit -m "Update GitHub stats" || exit 0
          git push
